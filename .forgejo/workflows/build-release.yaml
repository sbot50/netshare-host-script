name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: linux
            artifact_name: fireshare-host-script
          - target: x86_64-pc-windows-gnu
            os: windows
            artifact_name: fireshare-host-script.exe

    steps:
      - uses: actions/checkout@v3

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          profile: minimal

      - name: Cache APT metadata
        uses: actions/cache@v3
        with:
          path: |
            /var/lib/apt/lists
            /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('.forgejo/workflows/**') }}
          restore-keys: |
            apt-${{ runner.os }}-${{ matrix.target }}-

      - name: Install cross-compilation tools
        run: |
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get update
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-x86-64-linux-gnu g++-x86-64-linux-gnu libevdev-dev
          elif [ "${{ matrix.target }}" = "x86_64-pc-windows-gnu" ]; then
            sudo apt-get install -y mingw-w64
          fi

      - name: Create cargo config
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [target.x86_64-unknown-linux-gnu]
          linker = "x86_64-linux-gnu-gcc"

          [target.x86_64-pc-windows-gnu]
          linker = "x86_64-w64-mingw32-gcc"
          EOF

      - name: Build
        run: |
          . "$HOME/.cargo/env"
          cargo build --release --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v3

      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Create Gitea Release and Upload Assets
        uses: gitea.com/actions/gitea-release-action@v1
        with:
          api_url: ${{ github.server_url }}/api/v1
          token: ${{ secrets.TOKEN }}
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Automated release for ${{ github.ref_name }}
          files: |
            fireshare-host-script/*
            fireshare-host-script.exe/*